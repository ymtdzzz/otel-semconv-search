name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Weekly on Monday 00:00 UTC — picks up new semconv releases automatically
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm

      - name: Setup Weaver
        uses: open-telemetry/weaver/.github/actions/setup-weaver@9b84f5cd76cb98e8aaf37bc58936b31fe0ddbab4 # v0.24.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get week stamp
        id: date
        run: echo "week=$(date +'%Y-W%V')" >> "$GITHUB_OUTPUT"

      - name: Restore resolved cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: data/resolved
          key: semconv-resolved-${{ hashFiles('scripts/resolve.sh', 'scripts/weaver-templates/**') }}-${{ steps.date.outputs.week }}
          restore-keys: semconv-resolved-${{ hashFiles('scripts/resolve.sh', 'scripts/weaver-templates/**') }}-

      - name: Resolve semconv versions
        run: pnpm resolve

      - name: Build dataset
        run: pnpm build:data

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build site
        run: pnpm build
        env:
          SITE: ${{ steps.pages.outputs.origin }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
