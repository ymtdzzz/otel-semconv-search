name: Update semconv dataset

on:
  schedule:
    # Weekly on Monday 00:00 UTC — picks up new semconv releases automatically
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-semconv
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm

      - name: Setup Weaver
        uses: open-telemetry/weaver/.github/actions/setup-weaver@adcf6fda79c3df1cb537669442aef753b7019777 # v0.24.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get week stamp
        id: date
        run: echo "week=$(date +'%Y-W%V')" >> "$GITHUB_OUTPUT"

      - name: Restore resolved cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: data/resolved
          key: semconv-resolved-${{ hashFiles('scripts/resolve.sh', 'scripts/weaver-templates/**') }}-${{ steps.date.outputs.week }}
          restore-keys: semconv-resolved-${{ hashFiles('scripts/resolve.sh', 'scripts/weaver-templates/**') }}-

      - name: Resolve semconv versions
        run: pnpm resolve

      - name: Build dataset
        run: pnpm build:data

      # NOTE: build:data always rewrites `generatedAt`, so the file differs on every
      # run. Revert the change when nothing but that timestamp moved, so a week
      # with no new semconv release does not open a no-op PR.
      - name: Discard timestamp-only changes
        run: |
          if git diff --quiet -- src/data/semconv.json; then
            exit 0
          fi
          before=$(git show HEAD:src/data/semconv.json | jq -S 'del(.generatedAt)')
          after=$(jq -S 'del(.generatedAt)' src/data/semconv.json)
          if [ "$before" = "$after" ]; then
            echo "Only generatedAt changed — reverting."
            git checkout -- src/data/semconv.json
          fi

      # FIXME: use Github App token to trigger CI on the generated PR
      - name: Validate dataset
        run: |
          pnpm test
          pnpm build

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          add-paths: src/data/semconv.json
          branch: chore/update-semconv-data
          commit-message: "chore: update semconv dataset"
          title: "chore: update semconv dataset"
          body: |
            Automated update of `src/data/semconv.json` generated by Weaver.

            - Generated by the `Update semconv dataset` workflow.
            - Review the diff, then merge to trigger a deploy.
          labels: dependencies
